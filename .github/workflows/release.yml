name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      publish_cdn:
        description: "Upload to download CDN"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOWNLOAD_BASE_URL: ${{ secrets.DOWNLOAD_BASE_URL }}
  VITE_UPDATE_JSON_URL: ${{ secrets.VITE_UPDATE_JSON_URL }}
  STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
  STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
  STORAGE_SECRET: ${{ secrets.STORAGE_SECRET }}
  STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
  STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
  STORAGE_PUBLIC_BASE_URL: ${{ secrets.STORAGE_PUBLIC_BASE_URL }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve version
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if (-not $v) {
            $ref = "${{ github.ref_name }}"
            if ($ref -like "v*") { $v = $ref.Substring(1) } else { $v = "1.0.0" }
          }
          "VERSION=$v" >> $env:GITHUB_ENV
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Configure publish
        shell: pwsh
        run: node scripts/desktop/configure-publish.mjs
      - name: Generate icons
        run: node scripts/desktop/generate-icons.mjs
      - name: Sync version
        shell: pwsh
        run: |
          $pkg = Get-Content apps/desktop/package.json | ConvertFrom-Json
          $pkg.version = $env:VERSION
          $pkg | ConvertTo-Json -Depth 10 | Set-Content apps/desktop/package.json
          (Get-Content apps/desktop/src-tauri/tauri.conf.json -Raw) -replace '"version": "[^"]+"', "`"version`": `"$($env:VERSION)`"" | Set-Content apps/desktop/src-tauri/tauri.conf.json
          (Get-Content apps/desktop/src-tauri/Cargo.toml -Raw) -replace 'version = "[^"]+"', "version = `"$($env:VERSION)`"" | Set-Content apps/desktop/src-tauri/Cargo.toml
      - name: Build frontend
        run: pnpm --filter @acs/desktop build
      - name: Build Tauri Windows x64 (NSIS)
        run: powershell -ExecutionPolicy Bypass -File scripts/desktop/build-windows.ps1
      - name: Collect release artifacts
        run: pnpm exec tsx scripts/desktop/publish-release.ts --version ${{ env.VERSION }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            download/windows/
            download/update/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Resolve version
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            REF="${{ github.ref_name }}"
            if [[ "$REF == v* ]]; then V="${REF#v}"; else V="1.0.0"; fi
          fi
          echo "VERSION=$V" >> $GITHUB_ENV
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Configure publish
        run: node scripts/desktop/configure-publish.mjs
      - name: Generate icons
        run: node scripts/desktop/generate-icons.mjs
      - name: Sync version
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('apps/desktop/package.json','utf8'));p.version=process.env.VERSION;fs.writeFileSync('apps/desktop/package.json',JSON.stringify(p,null,2));"
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" apps/desktop/src-tauri/tauri.conf.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" apps/desktop/src-tauri/Cargo.toml
      - name: Build frontend
        run: pnpm --filter @acs/desktop build
      - name: Build Tauri macOS Universal
        run: bash scripts/desktop/build-macos.sh
      - name: Collect release artifacts
        run: pnpm exec tsx scripts/desktop/publish-release.ts --version ${{ env.VERSION }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            download/mac/
            download/update/

  github-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge installers
        run: |
          mkdir -p release-assets
          cp artifacts/release-windows/windows/AI-Commerce-Setup.exe release-assets/ 2>/dev/null || {
            echo "Windows installer missing" >&2
            exit 1
          }
          cp artifacts/release-macos/mac/AI-Commerce.dmg release-assets/ 2>/dev/null || {
            echo "macOS DMG missing" >&2
            exit 1
          }
          cp artifacts/release-windows/update/update.json release-assets/ 2>/dev/null || true
          ls -la release-assets/
      - name: Resolve version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            REF="${{ github.ref_name }}"
            if [[ "$REF == v* ]]; then V="${REF#v}"; else V="1.0.0"; fi
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', steps.ver.outputs.version) }}
          name: AI Commerce Desktop v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/AI-Commerce-Setup.exe
            release-assets/AI-Commerce.dmg
            release-assets/update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-download-center:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event.inputs.publish_cdn == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Resolve version
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            REF="${{ github.ref_name }}"
            if [[ "$REF == v* ]]; then V="${REF#v}"; else V="1.0.0"; fi
          fi
          echo "VERSION=$V" >> $GITHUB_ENV
      - name: Merge download center
        run: |
          mkdir -p download/windows download/mac download/update
          cp -r artifacts/release-windows/windows/* download/windows/ 2>/dev/null || true
          cp -r artifacts/release-macos/mac/* download/mac/ 2>/dev/null || true
          cp artifacts/release-windows/update/update.json download/update/ 2>/dev/null || \
          cp artifacts/release-macos/update/update.json download/update/ 2>/dev/null || true
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Regenerate update.json
        run: pnpm exec tsx scripts/desktop/publish-release.ts --version ${{ env.VERSION }}
      - name: Upload to download CDN
        continue-on-error: true
        env:
          STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET: ${{ secrets.STORAGE_SECRET }}
          STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          STORAGE_PUBLIC_BASE_URL: ${{ secrets.STORAGE_PUBLIC_BASE_URL }}
          STORAGE_REGION: ${{ secrets.STORAGE_REGION }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          OSS_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY }}
          OSS_SECRET_KEY: ${{ secrets.OSS_SECRET_KEY }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_PUBLIC_BASE_URL: ${{ secrets.OSS_PUBLIC_BASE_URL }}
          COS_ACCESS_KEY: ${{ secrets.COS_ACCESS_KEY }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_ENDPOINT: ${{ secrets.COS_ENDPOINT }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
          DOWNLOAD_BASE_URL: ${{ secrets.DOWNLOAD_BASE_URL }}
        run: pnpm exec tsx scripts/desktop/publish-release.ts --version ${{ env.VERSION }} --cdn
