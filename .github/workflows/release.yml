name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      publish_cdn:
        description: "Upload to download CDN"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CI: true
  VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
  API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
  DOWNLOAD_BASE_URL: ${{ secrets.DOWNLOAD_BASE_URL }}
  VITE_UPDATE_JSON_URL: ${{ secrets.VITE_UPDATE_JSON_URL }}
  STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
  STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
  STORAGE_SECRET: ${{ secrets.STORAGE_SECRET }}
  STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
  STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
  STORAGE_PUBLIC_BASE_URL: ${{ secrets.STORAGE_PUBLIC_BASE_URL }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve version
        run: node scripts/desktop/resolve-version.mjs "${{ github.event.inputs.version }}"
      - name: Install dependencies
        run: npm ci
      - name: Configure publish
        run: node scripts/desktop/configure-publish.mjs
      - name: Sync version
        run: node scripts/desktop/sync-version.mjs ${{ env.VERSION }}
      - name: Generate icons
        run: node scripts/desktop/generate-icons.mjs
      - name: Build Windows NSIS
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --bundles nsis
      - name: Collect Windows installer
        shell: pwsh
        run: |
          $Root = "$env:GITHUB_WORKSPACE"
          $NsisDir = Join-Path $Root "apps\desktop\src-tauri\target\release\bundle\nsis"
          $OutDir = Join-Path $Root "download\windows"
          New-Item -ItemType Directory -Force -Path $OutDir | Out-Null
          $Setup = Get-ChildItem -Path $NsisDir -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $Setup) { throw "NSIS installer not found under $NsisDir" }
          Copy-Item $Setup.FullName (Join-Path $OutDir "AI-Commerce-Setup.exe") -Force
          Write-Host "Collected $($Setup.Name) -> download/windows/AI-Commerce-Setup.exe"
      - name: Collect release metadata
        run: npx tsx scripts/desktop/publish-release.ts --version ${{ env.VERSION }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            download/windows/
            download/update/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Resolve version
        run: node scripts/desktop/resolve-version.mjs "${{ github.event.inputs.version }}"
      - name: Install dependencies
        run: npm ci
      - name: Configure publish
        run: node scripts/desktop/configure-publish.mjs
      - name: Sync version
        run: node scripts/desktop/sync-version.mjs ${{ env.VERSION }}
      - name: Generate icons
        run: node scripts/desktop/generate-icons.mjs
      - name: Build macOS Universal DMG
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --target universal-apple-darwin --bundles dmg
      - name: Collect macOS DMG
        run: |
          mkdir -p download/mac
          DMG=$(find apps/desktop/src-tauri/target -name '*.dmg' -print -quit)
          if [ -z "$DMG" ]; then echo "DMG not found" >&2; exit 1; fi
          cp "$DMG" download/mac/AI-Commerce.dmg
          ls -la download/mac/
      - name: Collect release metadata
        run: npx tsx scripts/desktop/publish-release.ts --version ${{ env.VERSION }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            download/mac/
            download/update/

  github-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge installers
        run: |
          mkdir -p release-assets
          cp artifacts/release-windows/windows/AI-Commerce-Setup.exe release-assets/
          cp artifacts/release-macos/mac/AI-Commerce.dmg release-assets/
          cp artifacts/release-windows/update/update.json release-assets/ 2>/dev/null || true
          ls -la release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: AI Commerce Desktop ${{ github.event_name == 'push' && github.ref_name || format('v{0}', github.event.inputs.version) }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/AI-Commerce-Setup.exe
            release-assets/AI-Commerce.dmg
            release-assets/update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-download-center:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event.inputs.publish_cdn == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Resolve version
        run: node scripts/desktop/resolve-version.mjs "${{ github.event.inputs.version }}"
      - name: Merge download center
        run: |
          mkdir -p download/windows download/mac download/update
          cp -r artifacts/release-windows/windows/* download/windows/
          cp -r artifacts/release-macos/mac/* download/mac/
          cp artifacts/release-windows/update/update.json download/update/
      - name: Install dependencies
        run: npm ci
      - name: Upload to download CDN
        continue-on-error: true
        env:
          STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET: ${{ secrets.STORAGE_SECRET }}
          STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          STORAGE_PUBLIC_BASE_URL: ${{ secrets.STORAGE_PUBLIC_BASE_URL }}
          DOWNLOAD_BASE_URL: ${{ secrets.DOWNLOAD_BASE_URL }}
        run: npx tsx scripts/desktop/publish-release.ts --version ${{ env.VERSION }} --cdn
