# Release Candidate — Production Docker Compose
# Usage: docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.production up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: acs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_commerce_studio}
    volumes:
      - acs_pg_data:/var/lib/postgresql/data
      - ../../backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_commerce_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - acs-net

  redis:
    image: redis:7-alpine
    container_name: acs-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - acs_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - acs-net

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: acs-api
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_commerce_studio}?schema=public
      REDIS_URL: redis://redis:6379
      USE_REDIS_QUEUE: "true"
      USE_MEMORY_QUEUE: "false"
      API_PORT: "3001"
      LOG_DIR: /app/logs
    ports:
      - "3001:3001"
    volumes:
      - ../../logs:/app/logs
      - acs_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>r.json()).then(j=>process.exit(j.success?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - acs-net

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: acs-worker
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_commerce_studio}?schema=public
      REDIS_URL: redis://redis:6379
      USE_REDIS_QUEUE: "true"
      USE_MEMORY_QUEUE: "false"
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      LOG_DIR: /app/logs
    volumes:
      - ../../logs:/app/logs
      - acs_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - acs-net

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://api:3001}
    container_name: acs-admin
    restart: unless-stopped
    environment:
      PORT: "3002"
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:3001}
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - acs-net

  nginx:
    image: nginx:1.27-alpine
    container_name: acs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_started
    networks:
      - acs-net

networks:
  acs-net:
    driver: bridge

volumes:
  acs_pg_data:
  acs_redis_data:
  acs_storage:
